name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - site: rotman.dev
            build_cmd: bun run build
            dist_path: dist
          - site: claude.rotman.dev
            build_cmd: "true"
            dist_path: claude
          - site: chatgpt.rotman.dev
            build_cmd: "true"
            dist_path: chatgpt
          - site: gemini.rotman.dev
            build_cmd: cd gemini && npm ci && npm run build
            dist_path: gemini/dist
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        if: matrix.site == 'rotman.dev'
      - run: bun install --frozen-lockfile
        if: matrix.site == 'rotman.dev'
      - name: Build ${{ matrix.site }}
        run: ${{ matrix.build_cmd }}
      - name: Include API
        if: matrix.site == 'rotman.dev'
        run: cp -r api dist/api
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.site }}
          path: ${{ matrix.dist_path }}/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - site: rotman.dev
          - site: claude.rotman.dev
          - site: chatgpt.rotman.dev
          - site: gemini.rotman.dev
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.site }}
          path: dist/
      - name: Install sshpass
        run: sudo apt-get install -y sshpass
      - name: Deploy ${{ matrix.site }}
        env:
          SSH_PW: ${{ secrets.SSH_PW }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ matrix.site }}/httpdocs
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ARCHIVE="/tmp/deploy-${{ matrix.site }}.tar.gz"
          tar -czf dist.tar.gz -C dist .
          sshpass -p "$SSH_PW" scp dist.tar.gz "${SSH_USER}@${SSH_HOST}:${ARCHIVE}"
          sshpass -p "$SSH_PW" ssh "${SSH_USER}@${SSH_HOST}" "
            mkdir -p ${DEPLOY_PATH}
            rm -rf ${DEPLOY_PATH}/*
            tar -xzf ${ARCHIVE} -C ${DEPLOY_PATH}
            rm ${ARCHIVE}
          "
